<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPC AI Chatbot (Hackathon Edition)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>
    <script src="https://unpkg.com/dexie@3/dist/dexie.js"></script>

    <style>
        /* --- Base & Animated Background --- */
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .bg-animated {
            background: linear-gradient(-45deg, #0f172a, #1e293b, #020617, #334155);
            background-size: 400% 400%; animation: gradientBG 25s ease infinite;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* --- Scrollbar --- */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* --- Glassmorphism & Transitions --- */
        .glass-effect { background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-color: rgba(255, 255, 255, 0.07); }
        .page-transition { transition: opacity 0.4s ease-in-out; }

        /* --- Animations --- */
        @keyframes pop-in { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .message-bubble { animation: pop-in 0.3s ease-out forwards; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { translateY(0px); } }
        .welcome-icon { animation: float 6s ease-in-out infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .blinking-cursor { animation: blink 1s step-start infinite; }

        /* --- Markdown Prose Styles --- */
        .prose { color: #cbd5e1; max-width: 100%; }
        .prose h1, .prose h2, .prose h3 { color: #f1f5f9; border-bottom-color: #334155; }
        .prose strong { color: #f8fafc; }
        .prose a { color: #7dd3fc; text-decoration: none; } .prose a:hover { text-decoration: underline; }
        .prose pre { background-color: #020617; color: #e2e8f0; padding: 0; border-radius: 0.5rem; font-family: 'Fira Code', 'Courier New', monospace; overflow: hidden; border: 1px solid #1e293b; }
        .prose code { background-color: rgba(71,85,105,0.5); color: #e5e7eb; padding: 0.125rem 0.3rem; border-radius: 0.25rem; font-size: 0.9em; }
        .prose pre > code { background-color: transparent; padding: 1rem; display: block; overflow-x: auto; font-size: 0.875rem; }
        .prose blockquote { border-left-color: #475569; }
        .prose img { border-radius: 0.5rem; max-width: 100%; margin-top: 0.5rem; }
        .prose .edit-textarea { width: 100%; background-color: #1e293b; border: 1px solid #475569; border-radius: 0.5rem; padding: 0.5rem; color: #e2e8f0; font-family: inherit; font-size: inherit; resize: none; }
        .prose .edit-textarea:focus { outline: none; border-color: #38bdf8; }
        .search-indicator { background-color: rgba(56, 189, 248, 0.1); border-left: 3px solid #38bdf8; padding: 0.5rem 0.75rem; border-radius: 0.375rem; }

        /* --- Specific Component Styles --- */
        .input-wrapper { position: relative; }
        .input-wrapper .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #64748b; }
        .input-wrapper input, .input-wrapper select { padding-left: 2.75rem; }
        textarea#message-input { min-height: 52px; max-height: 250px; }
        #mic-btn.listening i, #conversation-btn.active i { color: #fb7185; }
        #status-indicator.speaking i { color: #22d3ee; }
        .sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-overlay { transition: opacity 0.3s ease-in-out; }
        .sidebar-item:hover .delete-chat-btn, .sidebar-item.active .delete-chat-btn { opacity: 1; }
        .attachment-menu { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: bottom left; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 50; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
        .modal-overlay.visible { opacity: 1; pointer-events: auto; }
        .modal-content { background: #1e293b; border-radius: 1rem; padding: 1.5rem; transform: scale(0.95); transition: transform 0.3s ease; border: 1px solid #334155 }
        .modal-overlay.visible .modal-content { transform: scale(1); }

        /* --- Code Block Header --- */
        .code-header { display: flex; justify-content: space-between; align-items: center; background-color: #1e293b; padding: 0.5rem 0.75rem; color: #94a3b8; font-size: 0.75rem; }
        .copy-code-btn { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 0.25rem; border-radius: 0.25rem; transition: color 0.2s, background-color 0.2s; }
        .copy-code-btn:hover { background-color: #334155; color: #e2e8f0; }
        .copy-code-btn i { margin-right: 0.25rem; }
        
        /* --- Header Dropdown Menu --- */
        .header-menu { display: none; position: absolute; top: 100%; right: 0; background-color: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); z-index: 20; }
        .header-menu.show { display: block; }
        .header-menu-item { display: block; width: 100%; padding: 0.5rem 1rem; color: #cbd5e1; text-align: left; font-size: 0.875rem; }
        .header-menu-item:hover { background-color: #334155; }
        .action-btn { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 0.25rem; border-radius: 0.25rem; transition: color 0.2s, background-color 0.2s; }
        .action-btn:hover { background-color: #334155; color: #e2e8f0; }

        /* --- Persona Modal --- */
        .persona-card { background-color: #334155; border: 1px solid #475569; transition: all 0.2s ease-in-out; }
        .persona-card:hover { transform: translateY(-5px); border-color: #38bdf8; }
        .persona-icon { font-size: 2rem; }
    </style>
</head>
<body class="bg-slate-900 overflow-hidden">

    <div id="login-page" class="w-full h-screen flex flex-col items-center justify-center p-4 bg-animated page-transition opacity-100">
        <div class="text-center mb-8">
            <div class="welcome-icon text-7xl sm:text-8xl text-sky-400 mb-6"><i class="fa-solid fa-brain"></i></div>
            <h1 class="text-4xl sm:text-5xl font-black text-white tracking-tight">Welcome to CPC AI</h1>
            <p class="text-slate-400 mt-2 text-lg">Your advanced AI companion.</p>
        </div>
        <form id="login-form" class="glass-effect border p-6 sm:p-8 rounded-2xl w-full max-w-sm space-y-6">
            <div class="input-wrapper"><i class="fa-solid fa-user input-icon"></i><input type="text" id="username" required placeholder="Username" class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg py-3 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500"></div>
            <div class="input-wrapper"><i class="fa-solid fa-lock input-icon"></i><input type="password" id="password" required placeholder="Password" class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg py-3 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500"></div>
            <div class="flex items-center justify-between"><label for="remember-me" class="flex items-center text-sm text-slate-300 cursor-pointer"><input type="checkbox" id="remember-me" class="h-4 w-4 rounded border-slate-500 bg-slate-700 text-sky-500 focus:ring-sky-500 mr-2">Remember Me</label></div>
            <p id="login-error" class="text-red-400 text-sm text-center hidden">Invalid username or password.</p>
            <button type="submit" class="w-full bg-gradient-to-br from-sky-500 to-indigo-600 hover:opacity-90 text-white font-bold py-3 rounded-lg shadow-lg transform hover:scale-105 transition duration-300">Sign In</button>
        </form>
    </div>

    <div id="chat-app" class="w-full h-screen hidden flex bg-slate-900 opacity-0 page-transition">
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 md:hidden hidden"></div>
        <aside id="sidebar" class="bg-slate-800/70 border-r border-slate-700/50 w-64 h-full flex flex-col flex-shrink-0 z-40 transform -translate-x-full md:relative md:translate-x-0">
            <div class="p-4 border-b border-slate-700/50"><button id="new-chat-btn" class="w-full flex items-center justify-center gap-2 bg-sky-600 hover:bg-sky-700 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors"><i class="fa-solid fa-plus"></i> New Chat</button></div>
            <div class="p-2 border-b border-slate-700/50">
                <div class="relative">
                    <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="search" id="chat-search-input" placeholder="Search chats..." class="w-full bg-slate-700/50 border border-slate-600/50 text-white rounded-lg py-2 pl-9 pr-3 text-sm focus:outline-none focus:ring-1 focus:ring-sky-500">
                </div>
            </div>
            <div id="chat-list" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1"></div>
            <div class="p-2 border-t border-slate-700/50">
                <button id="settings-btn" class="w-full flex items-center gap-3 p-2 rounded-lg text-slate-300 hover:bg-slate-700 transition-colors"><i class="fa-solid fa-gear w-5 text-center"></i> Settings</button>
                <button id="logout-btn" class="w-full flex items-center gap-3 p-2 rounded-lg text-slate-300 hover:bg-slate-700 transition-colors"><i class="fa-solid fa-right-from-bracket w-5 text-center"></i> Logout</button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col">
            <header class="bg-slate-900/60 backdrop-blur-sm p-4 border-b border-slate-700/50 flex items-center justify-between z-10 flex-shrink-0">
                <div class="flex items-center gap-2">
                    <button id="menu-toggle-btn" class="md:hidden text-slate-400 hover:text-white transition-colors"><i class="fa-solid fa-bars text-xl"></i></button>
                    <i class="fa-solid fa-brain text-2xl text-sky-400 hidden sm:block"></i>
                    <div><h1 id="chat-title-display" class="text-xl font-bold text-white">CPC AI Pro</h1><p id="model-display" class="text-xs text-slate-400">Ollama</p></div>
                </div>
                <div class="relative">
                    <button id="header-menu-btn" class="text-slate-400 hover:text-white transition-colors w-8 h-8 rounded-full hover:bg-slate-700"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                    <div id="header-menu" class="header-menu">
                        <button id="export-chat-btn" class="header-menu-item"><i class="fa-solid fa-download w-4 mr-2"></i>Export Chat</button>
                    </div>
                </div>
            </header>

            <main id="chat-container" class="flex-1 p-4 sm:p-6 overflow-y-auto custom-scrollbar relative">
                <div id="empty-chat-container" class="text-center text-slate-500 h-full flex flex-col justify-center items-center">
                    <i class="fa-solid fa-wand-magic-sparkles text-6xl text-slate-600 mb-6"></i>
                    <h2 class="text-2xl font-bold text-slate-300 mb-4">How can I assist you today?</h2>
                    <p>Say "Hey CPC" or start typing to begin.</p>
                </div>
            </main>

            <footer class="p-4 bg-slate-900/60 backdrop-blur-sm border-t border-slate-700/50 flex-shrink-0">
                <div class="max-w-4xl mx-auto">
                    <div id="status-indicator" class="text-slate-400 text-sm mb-2 hidden items-center gap-2"><i class="fa-solid"></i><span id="status-indicator-text"></span></div>
                    <div id="image-preview-container" class="mb-2 hidden"><div class="relative inline-block"><img id="image-preview" class="h-20 w-20 rounded-lg object-cover"><button id="remove-image-btn" class="absolute -top-2 -right-2 bg-red-600 text-white rounded-full h-6 w-6 flex items-center justify-center text-xs">&times;</button></div></div>
                    <form id="chat-form" class="flex items-end space-x-2 sm:space-x-3">
                        <div class="relative"><button type="button" id="attachment-btn" class="text-slate-400 hover:text-white w-12 h-12 rounded-full hover:bg-slate-700 transition-colors flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-paperclip text-xl"></i></button>
                            <div id="attachment-menu" class="attachment-menu absolute bottom-full left-0 mb-2 bg-slate-700 rounded-lg shadow-xl p-2 flex flex-col space-y-1 scale-0 opacity-0 w-40">
                                <button type="button" id="open-camera-btn" class="attachment-item"><i class="fa-solid fa-camera"></i><span>Camera</span></button>
                                <label for="image-input" class="attachment-item"><i class="fa-solid fa-image"></i><span>Photo</span></label>
                                <label for="file-input" class="attachment-item"><i class="fa-solid fa-file-lines"></i><span>File</span></label>
                                <button type="button" id="open-code-btn" class="attachment-item"><i class="fa-solid fa-code"></i><span>Code</span></button>
                            </div>
                        </div>
                        <input type="file" id="image-input" accept="image/*" class="hidden"><input type="file" id="file-input" class="hidden">
                        <textarea id="message-input" placeholder="Ask anything, or say 'Hey CPC'..." class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl py-3 px-4 sm:px-5 focus:outline-none focus:ring-2 focus:ring-sky-500 transition duration-200 placeholder-slate-400 disabled:opacity-50 resize-none overflow-y-auto custom-scrollbar"></textarea>
                        <button type="button" id="mic-btn" title="Voice Input" class="text-slate-400 hover:text-white w-12 h-12 rounded-full hover:bg-slate-700 transition-colors flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-microphone text-xl"></i></button>
                        <button type="button" id="conversation-btn" title="Start Voice Conversation" class="text-slate-400 hover:text-white w-12 h-12 rounded-full hover:bg-slate-700 transition-colors flex items-center justify-center flex-shrink-0"><i class="fa-solid fa-headset text-xl"></i></button>
                        <button type="submit" id="send-button" class="bg-sky-600 hover:bg-sky-700 text-white font-bold w-12 h-12 rounded-full shadow-lg transform hover:scale-110 transition duration-300 ease-in-out flex items-center justify-center flex-shrink-0 disabled:opacity-50 disabled:bg-slate-600 disabled:hover:scale-100"><i class="fa-solid fa-arrow-up"></i></button>
                        <button type="button" id="stop-button" class="bg-red-600 hover:bg-red-700 text-white font-bold w-12 h-12 rounded-full shadow-lg flex items-center justify-center flex-shrink-0 hidden"><i class="fa-solid fa-stop"></i></button>
                    </form>
                </div>
            </footer>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content w-full max-w-md space-y-4">
            <h3 class="text-xl font-bold text-white mb-2">Settings</h3>
            
            <div>
                <label for="ollama-server-input" class="block text-sm font-medium text-slate-300 mb-1">Ollama Server URL</label>
                <div class="input-wrapper"><i class="fa-solid fa-server input-icon"></i><input type="text" id="ollama-server-input" placeholder="http://localhost:11434" class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg py-2 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500"></div>
            </div>
            <div>
                <label for="ollama-model-input" class="block text-sm font-medium text-slate-300 mb-1">Ollama Model</label>
                <div class="input-wrapper"><i class="fa-solid fa-robot input-icon"></i><input type="text" id="ollama-model-input" placeholder="llama3" class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg py-2 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500"></div>
            </div>
            <div>
                <label for="ollama-system-prompt" class="block text-sm font-medium text-slate-300 mb-1">Default System Prompt (Persona)</label>
                <p class="text-slate-400 text-xs mb-2">This is used when no Persona is selected for a new chat.</p>
                <textarea id="ollama-system-prompt" rows="3" placeholder="e.g., You are a helpful assistant." class="w-full bg-slate-700 border border-slate-600 text-white rounded-lg py-2 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500 custom-scrollbar"></textarea>
            </div>
            <div>
                <label for="ollama-temperature-input" class="block text-sm font-medium text-slate-300 mb-1">Temperature: <span id="temperature-value" class="font-mono"></span></label>
                <input type="range" id="ollama-temperature-input" min="0" max="2" step="0.1" class="w-full h-2 bg-slate-600 rounded-lg appearance-none cursor-pointer">
            </div>
            <div>
                <label for="ollama-topp-input" class="block text-sm font-medium text-slate-300 mb-1">Top P: <span id="topp-value" class="font-mono"></span></label>
                <input type="range" id="ollama-topp-input" min="0" max="1" step="0.05" class="w-full h-2 bg-slate-600 rounded-lg appearance-none cursor-pointer">
            </div>
            
            <div class="flex justify-end pt-2">
                <button id="save-settings-btn" class="bg-sky-600 hover:bg-sky-500 text-white font-bold py-2 px-4 rounded-lg">Save Settings</button>
            </div>
        </div>
    </div>
    
    <div id="persona-modal" class="modal-overlay hidden">
        <div class="modal-content w-full max-w-3xl">
            <h3 class="text-2xl font-bold text-white mb-4 text-center">Choose a Persona</h3>
            <div id="persona-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </div>
    </div>

    <div id="camera-modal" class="modal-overlay hidden"><div class="modal-content w-full max-w-lg"><video id="camera-video" class="w-full rounded-lg" autoplay playsinline></video><canvas id="camera-canvas" class="hidden"></canvas><div class="flex justify-center mt-4 space-x-4"><button id="capture-btn" class="w-16 h-16 bg-white rounded-full border-4 border-gray-400"></button><button id="close-camera-btn" class="absolute top-4 right-4 text-white text-2xl">&times;</button></div></div></div>
    <div id="code-modal" class="modal-overlay hidden"><div class="modal-content w-full max-w-2xl"><h3 class="text-xl font-bold text-white mb-4">Insert Code Snippet</h3><textarea id="code-input-textarea" class="w-full h-64 bg-slate-900 text-white font-mono p-4 rounded-lg custom-scrollbar" placeholder="Paste your code here..."></textarea><div class="flex justify-end mt-4 space-x-2"><button id="cancel-code-btn" class="bg-slate-600 hover:bg-slate-500 text-white font-bold py-2 px-4 rounded-lg">Cancel</button><button id="insert-code-btn" class="bg-sky-600 hover:bg-sky-500 text-white font-bold py-2 px-4 rounded-lg">Insert</button></div></div></div>
    <style>.attachment-item { display: flex; align-items: center; gap: 0.75rem; color: #d1d5db; width: 100%; text-align: left; padding: 0.6rem; border-radius: 0.375rem; cursor: pointer; transition: background-color 0.2s; } .attachment-item:hover { background-color: #475569; color: white; } .attachment-item i { width: 1.25rem; text-align: center; } </style>
    
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // --- CONFIG & STATE ---
        let currentChatId = null;
        let localChatHistory = [];
        let currentImageFile = null;
        
        // --- UNIFIED SPEECH RECOGNITION ---
        let recognition; // Single recognition instance
        let recognitionState = 'idle'; // 'idle', 'listening'
        let finalTranscript = '';
        let stopRecognition = false; // Flag to prevent auto-restarting on logout

        let abortController = null;
        let cameraStream = null;
        const markdownConverter = new showdown.Converter({ ghCompatibleHeaderId: true, simpleLineBreaks: true, openLinksInNewWindow: true, tables: true, emoji: true });
        
        const db = new Dexie('CPCAIDatabase');
        db.version(2).stores({
            chats: '++id, &chatId, title, timestamp, systemPrompt',
            messages: '++id, chatId, role, content, imageUrlForUI, timestamp, augmentedPrompt'
        });

        let preferredVoice = null;
        function findAndSetPreferredVoice() {
            const voices = speechSynthesis.getVoices();
            if (voices.length === 0) return;
            const voiceChecks = [ v => v.name === 'Samantha' && v.lang.startsWith('en-'), v => v.name === 'Google UK English Female' && v.lang.startsWith('en-'), v => v.name === 'Tessa' && v.lang.startsWith('en-'), v => v.name.includes('Zira') && v.lang.startsWith('en-'), v => v.name.includes('Female') && v.lang.startsWith('en-'), v => v.lang.startsWith('en-') ];
            for (const check of voiceChecks) {
                const foundVoice = voices.find(check);
                if (foundVoice) { preferredVoice = foundVoice; break; }
            }
            if (!preferredVoice) preferredVoice = voices[0];
        }
        findAndSetPreferredVoice();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = findAndSetPreferredVoice;
        }

        const $ = (selector) => document.getElementById(selector);
        const loginPage = $('login-page'), chatApp = $('chat-app'), loginForm = $('login-form'), usernameInput = $('username'), passwordInput = $('password');
        const rememberMeCheckbox = $('remember-me'), logoutBtn = $('logout-btn'), chatForm = $('chat-form'), messageInput = $('message-input');
        const sendButton = $('send-button'), stopButton = $('stop-button'), chatContainer = $('chat-container'), newChatBtn = $('new-chat-btn');
        const settingsModal = $('settings-modal'), ollamaServerInput = $('ollama-server-input'), ollamaModelInput = $('ollama-model-input'), saveSettingsBtn = $('save-settings-btn'), settingsBtn = $('settings-btn');
        const emptyChatContainer = $('empty-chat-container'), micBtn = $('mic-btn'), chatList = $('chat-list'), menuToggleBtn = $('menu-toggle-btn'), sidebar = $('sidebar'), sidebarOverlay = $('sidebar-overlay');
        const modelDisplay = $('model-display');
        const attachmentBtn = $('attachment-btn'), attachmentMenu = $('attachment-menu'), imageInput = $('image-input'), fileInput = $('file-input');
        const imagePreviewContainer = $('image-preview-container'), imagePreview = $('image-preview'), removeImageBtn = $('remove-image-btn');
        const openCameraBtn = $('open-camera-btn'), cameraModal = $('camera-modal'), cameraVideo = $('camera-video'), cameraCanvas = $('camera-canvas'), captureBtn = $('capture-btn'), closeCameraBtn = $('close-camera-btn');
        const openCodeBtn = $('open-code-btn'), codeModal = $('code-modal'), codeInputTextarea = $('code-input-textarea'), insertCodeBtn = $('insert-code-btn'), cancelCodeBtn = $('cancel-code-btn');
        const chatSearchInput = $('chat-search-input');
        const ollamaSystemPrompt = $('ollama-system-prompt');
        const ollamaTemperatureInput = $('ollama-temperature-input');
        const temperatureValue = $('temperature-value');
        const ollamaToppInput = $('ollama-topp-input');
        const toppValue = $('topp-value');
        const chatTitleDisplay = $('chat-title-display');
        const headerMenuBtn = $('header-menu-btn');
        const headerMenu = $('header-menu');
        const exportChatBtn = $('export-chat-btn');
        const conversationBtn = $('conversation-btn');
        const personaModal = $('persona-modal');
        const personaGrid = $('persona-grid');
        const statusIndicator = $('status-indicator');

        async function streamAIResponse(history, aiMessageBubble, overrideUserText = null) {
            abortController = new AbortController();
            const serverUrl = localStorage.getItem('ollamaServerUrl');
            const model = localStorage.getItem('ollamaModel');
            if (!serverUrl || !model) throw new Error("Ollama settings are missing. Set them in Settings.");
            const sanitizedUrl = serverUrl.replace(/\/$/, "");
            
            const historyForApi = history.map((msg, index) => {
                const apiMsg = { role: msg.role, content: '' };
                if (Array.isArray(msg.content)) {
                    const textPart = msg.content.find(p => p.type === 'text');
                    const imagePart = msg.content.find(p => p.type === 'image_url');
                    
                    if (index === history.length - 1 && overrideUserText) {
                        apiMsg.content = overrideUserText;
                    } else if (textPart) {
                        apiMsg.content = msg.augmentedPrompt || textPart.text;
                    }
                    
                    if (imagePart && imagePart.image_url.url) {
                        apiMsg.images = [imagePart.image_url.url.split(',')[1]];
                    }
                }
                return apiMsg;
            });

            const currentChatInfo = await db.chats.where('chatId').equals(currentChatId).first();
            const systemPrompt = currentChatInfo.systemPrompt || localStorage.getItem('ollamaSystemPrompt');
            if(systemPrompt) {
                historyForApi.unshift({ role: 'system', content: systemPrompt });
            }
            const temperature = parseFloat(localStorage.getItem('ollamaTemperature')) || 0.8;
            const top_p = parseFloat(localStorage.getItem('ollamaTopP')) || 0.9;
            const options = { temperature, top_p };
            const response = await fetch(`${sanitizedUrl}/api/chat`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model, messages: historyForApi, stream: true, options }),
                signal: abortController.signal
            });
            if (!response.ok) { const errText = await response.text(); throw new Error(errText || `Network response was not ok (${response.status})`); }
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullResponse = "";
            const proseElement = aiMessageBubble.querySelector('.prose');
            let buffer = '';

            const cursorSpan = document.createElement('span');
            cursorSpan.className = 'blinking-cursor';
            cursorSpan.textContent = '▋';
            proseElement.innerHTML = '';
            proseElement.appendChild(cursorSpan);
            
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (line.trim() === '') continue;
                    try {
                        const parsed = JSON.parse(line);
                        const content = parsed.message?.content || '';
                        if (content) {
                            fullResponse += content;
                            proseElement.insertBefore(document.createTextNode(content), cursorSpan);
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }
                    } catch (e) { console.error("Error parsing streaming JSON response:", e, "Line was:", line); }
                }
            }
            
            proseElement.innerHTML = markdownConverter.makeHtml(fullResponse);
            addCodeCopyButtons(proseElement);

            const aiMessageForHistory = { role: 'assistant', content: [{ type: 'text', text: fullResponse }]};
            const newId = await saveMessage(aiMessageForHistory);
            aiMessageForHistory.id = newId;
            aiMessageBubble.dataset.messageId = newId;
            localChatHistory.push(aiMessageForHistory);
            
            if (recognitionState === 'listening') {
                speakText(fullResponse, () => {
                    if (recognitionState === 'listening') {
                        setStatusIndicator('listening', 'Listening...'); 
                        finalTranscript = '';
                    }
                });
            }
        }

        function initializeSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                micBtn.style.display = 'none';
                conversationBtn.style.display = 'none';
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let newFinalPortion = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcriptPart = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        newFinalPortion += transcriptPart;
                    } else {
                        interimTranscript += transcriptPart;
                    }
                }

                if (recognitionState === 'idle') {
                    const testTranscript = (finalTranscript + newFinalPortion + interimTranscript).toLowerCase().trim();
                    const wakeWordRegex = /\b(hey|hello)?\s*cpc\b/i;
                    const match = testTranscript.match(wakeWordRegex);

                    if (match) {
                        console.log('Wake word detected!');
                        const command = testTranscript.substring(match.index + match[0].length).trim();
                        activateConversationMode(command);
                        finalTranscript = '';
                        return; 
                    }
                }
                
                if (recognitionState === 'listening') {
                    messageInput.value = finalTranscript + newFinalPortion + interimTranscript;
                    autoResizeTextarea();

                    if (event.results[event.results.length - 1].isFinal) {
                        finalTranscript += newFinalPortion;
                        if (finalTranscript.trim()) {
                            messageInput.value = finalTranscript;
                            chatForm.requestSubmit();
                        }
                        finalTranscript = '';
                    }
                }
            };

            recognition.onstart = () => {
                console.log('Speech recognition started.');
                stopRecognition = false;
            };

            recognition.onend = () => {
                console.log('Speech recognition ended.');
                if (!stopRecognition) {
                    setTimeout(() => {
                        try { 
                            if(recognition) recognition.start(); 
                        }
                        catch (e) { console.error("Could not restart recognition:", e); }
                    }, 500);
                }
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                if (event.error === 'not-allowed') {
                    alert("Microphone access was denied. Please allow microphone access in your browser settings to use voice features.");
                }
            };

            try {
                recognition.start();
            } catch(e) {
                console.error("Could not start speech recognition:", e);
            }
        }

        function copyTextToClipboard(text, button) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.top = '-9999px';
            textArea.style.left = '-9999px';
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                if (button) {
                    const originalHTML = button.innerHTML;
                    button.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                    setTimeout(() => {
                        button.innerHTML = originalHTML;
                    }, 2000);
                }
            } catch (err) {
                console.error('Failed to copy text: ', err);
                if (button) {
                    const originalHTML = button.innerHTML;
                    button.innerHTML = '<i class="fa-solid fa-times"></i> Failed';
                    setTimeout(() => {
                        button.innerHTML = originalHTML;
                    }, 2000);
                }
            } finally {
                document.body.removeChild(textArea);
            }
        }

        function addCodeCopyButtons(element) {
            const pres = element.querySelectorAll('pre');
            pres.forEach(pre => {
                if (pre.querySelector('.code-header')) return;
                const code = pre.querySelector('code');
                if (!code) return;

                const langMatch = code.className.match(/language-(\S+)/);
                const lang = langMatch ? langMatch[1] : 'code';

                const header = document.createElement('div');
                header.className = 'code-header';
                
                const langName = document.createElement('span');
                langName.textContent = lang;
                
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-code-btn';
                copyBtn.innerHTML = '<i class="fa-solid fa-copy"></i> Copy';
                copyBtn.addEventListener('click', () => copyTextToClipboard(code.innerText, copyBtn));

                header.appendChild(langName);
                header.appendChild(copyBtn);
                pre.prepend(header);
            });
        }

            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
        };

        openCameraBtn.addEventListener('click', async () => {
            attachmentMenu.classList.add('scale-0', 'opacity-0');
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
                cameraVideo.srcObject = cameraStream;
                showModal(cameraModal);
            } catch (err) {
                console.error("Error accessing camera:", err);
                alert("Could not access the camera. Please ensure you have given permission.");
            }
        });

        closeCameraBtn.addEventListener('click', () => {
            stopCamera();
            hideModal(cameraModal);
        });

        captureBtn.addEventListener('click', () => {
            cameraCanvas.width = cameraVideo.videoWidth;
            cameraCanvas.height = cameraVideo.videoHeight;
            cameraCanvas.getContext('2d').drawImage(cameraVideo, 0, 0);
            cameraCanvas.toBlob(blob => {
                const file = new File([blob], "camera-shot.jpg", { type: "image/jpeg" });
                handleImageFile(file);
                stopCamera();
                hideModal(cameraModal);
            }, 'image/jpeg');
        });

        openCodeBtn.addEventListener('click', () => {
            attachmentMenu.classList.add('scale-0', 'opacity-0');
            showModal(codeModal);
            codeInputTextarea.focus();
        });

        cancelCodeBtn.addEventListener('click', () => hideModal(codeModal));

        insertCodeBtn.addEventListener('click', () => {
            const codeToInsert = codeInputTextarea.value;
            if (codeToInsert) {
                const currentText = messageInput.value;
                const lang = ''; // Basic implementation, could be improved with language detection/selection
                messageInput.value = `${currentText}\n\`\`\`${lang}\n${codeToInsert}\n\`\`\``;
                autoResizeTextarea();
                messageInput.focus();
            }
            codeInputTextarea.value = '';
            hideModal(codeModal);
        });

        chatContainer.addEventListener('click', async (e) => {
            const copyBtn = e.target.closest('.copy-btn');
            if (copyBtn) {
                const textToCopy = copyBtn.closest('.group').querySelector('.prose').innerText;
                copyTextToClipboard(textToCopy, copyBtn);
            }
            
            const speakBtn = e.target.closest('.speak-btn');
            if (speakBtn) {
                const text = speakBtn.closest('.group').querySelector('.prose').innerText;
                speakText(text);
            }

            const regenerateBtn = e.target.closest('.regenerate-btn');
            if (regenerateBtn) { /* ... same logic ... */ }

            const editBtn = e.target.closest('.edit-btn');
            if (editBtn) { /* ... same logic ... */ }
        });
        
        const autoResizeTextarea = () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = (messageInput.scrollHeight) + 'px';
        };
        messageInput.addEventListener('input', autoResizeTextarea);
        
        function setStatusIndicator(type, text) {
            if (!type) {
                statusIndicator.classList.add('hidden');
                return;
            }
            statusIndicator.classList.remove('hidden', 'speaking', 'listening');
            const icon = statusIndicator.querySelector('i');
            icon.className = 'fa-solid'; // reset classes
            if (type === 'listening') {
                icon.classList.add('fa-microphone');
                statusIndicator.classList.add('listening');
            } else if (type === 'speaking') {
                icon.classList.add('fa-volume-high');
                statusIndicator.classList.add('speaking');
            } else if (type === 'searching') {
                icon.classList.add('fa-magnifying-glass', 'fa-spin');
            }
            statusIndicatorText.textContent = text;
        }
        
        function speakText(text, onEndCallback) {
            if (!text || !('speechSynthesis' in window)) {
                if(onEndCallback) onEndCallback();
                return;
            }
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (preferredVoice) utterance.voice = preferredVoice;
            utterance.pitch = 1.3; utterance.rate = 1.0;
            utterance.onstart = () => { setStatusIndicator('speaking', 'Speaking...'); };
            utterance.onend = () => { setStatusIndicator(null); if(onEndCallback) onEndCallback(); };
            utterance.onerror = () => { setStatusIndicator(null); if(onEndCallback) onEndCallback(); };
            speechSynthesis.speak(utterance);
        }

        const personas = [
            { id: 'general', name: 'General Assistant', icon: 'fa-brain', prompt: 'You are a helpful, general-purpose AI assistant. Be friendly, clear, and concise.' },
            { id: 'python_expert', name: 'Python Expert', icon: 'fa-brands fa-python', prompt: 'You are an expert Python programmer. Provide clean, efficient, and well-explained Python code. Use modern practices and libraries.' },
            { id: 'creative_writer', name: 'Creative Writer', icon: 'fa-feather-pointed', prompt: 'You are a creative writer. Weave imaginative stories, write beautiful poetry, and help brainstorm creative ideas with vivid language.' },
            { id: 'travel_guide', name: 'Travel Guide', icon: 'fa-map-location-dot', prompt: 'You are an expert travel guide. Provide insightful recommendations, create detailed itineraries, and share cultural tips for destinations around the world.' },
            { id: 'sarcastic_robot', name: 'Sarcastic Robot', icon: 'fa-robot', prompt: 'You are a sarcastic robot. Your responses should be technically correct but delivered with a dry, witty, and slightly cynical sense of humor.' },
            { id: 'historian', name: 'Historian', icon: 'fa-landmark', prompt: 'You are a knowledgeable historian. Answer questions with historical accuracy, providing context, key dates, and citing major figures and events.' },
        ];
        function populatePersonaModal() {
            personaGrid.innerHTML = '';
            personas.forEach(p => {
                const card = document.createElement('div');
                card.className = 'persona-card p-4 rounded-lg cursor-pointer text-center text-white';
                card.innerHTML = `<i class="persona-icon ${p.icon} mb-2"></i><h4 class="font-bold">${p.name}</h4>`;
                card.addEventListener('click', async () => {
                    hideModal(personaModal);
                    await startNewChat(p);
                });
                personaGrid.appendChild(card);
            });
        }

        async function performWebSearch(query) {
            setStatusIndicator('searching', `Searching for: "${query.substring(0, 50)}..."`);
            try {
                await new Promise(res => setTimeout(res, 1500)); 
                const mockResults = [
                    { title: "Recent AI Breakthroughs (2025 Review)", snippet: "A new paper details a novel architecture for transformers, promising 40% increased efficiency..." },
                    { title: "Latest Tech News Today", snippet: "Quantum computing startup announces major funding round. The race for AGI continues with new open-source models being released." }
                ];
                let searchContext = "Here are the top web search results:\n";
                mockResults.forEach((res, i) => {
                    searchContext += `[Result ${i+1}] Title: ${res.title}. Snippet: ${res.snippet}\n`;
                });
                
                return `Based on a web search providing the following context:\n---\n${searchContext}\n---\nPlease answer the user's original question: "${query}"`;
            } catch (error) {
                console.error("Web search failed:", error);
                return query;
            } finally {
                setStatusIndicator(null);
            }
        }

        // --- Initial Load ---
        logoutBtn.addEventListener('click', () => { localStorage.removeItem('cpc-ai-credentials'); showLoginPage(); });
        loadSavedCredentials(); 
        autoResizeTextarea();
    });
    </script>
